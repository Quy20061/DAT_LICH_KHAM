<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đặt lịch khám sức khỏe online</title>
<script src="/vn-address.js"></script>
<style>
  /* Phông chữ chính: Times New Roman (kèm Tinos là bản web tương đương để máy thiếu font vẫn đúng) */
  @import url('https://fonts.googleapis.com/css2?family=Tinos:ital,wght@0,400;0,700;1,400&display=swap');

  :root {
    --navy: #0d3b66;
    --navy-700: #0a2e50;
    --navy-50: #eef3f9;
    --blue: #14507a;
    --teal: #16798f;
    --gold: #b5882b;
    --green: #1b7a4b;
    --green-50: #e7f3ec;
    --red: #b3261e;
    --red-50: #fbecea;
    --amber: #9a6700;
    --amber-50: #fbf3e2;
    --ink: #1c2430;
    --muted: #5b6675;
    --faint: #8a95a3;
    --line: #d9e0ea;
    --line-soft: #eceff4;
    --paper: #f6f8fb;
    --radius: 6px;
    --radius-lg: 10px;
    --shadow: 0 2px 4px rgba(13,59,102,.06);
    --shadow-md: 0 6px 22px rgba(13,59,102,.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Times New Roman', 'Tinos', Times, serif;
    background:
      linear-gradient(180deg, #eef3f9 0%, #f6f8fb 220px, #f6f8fb 100%);
    min-height: 100vh;
    padding: 30px 16px 60px;
    color: var(--ink);
    font-size: 17px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }

  .container { max-width: 720px; margin: 0 auto; }

  /* HEADER — như tiêu đề một văn bản y tế chính thức */
  .app-header {
    background: linear-gradient(135deg, var(--navy) 0%, var(--blue) 70%, var(--teal) 100%);
    border-radius: var(--radius-lg);
    padding: 26px 30px;
    color: #fff;
    margin-bottom: 22px;
    display: flex; align-items: center; gap: 18px;
    box-shadow: var(--shadow-md);
    position: relative; overflow: hidden;
    border: 1px solid var(--navy-700);
  }
  .app-header::after {
    content: ''; position: absolute; right: 24px; top: 50%; transform: translateY(-50%);
    width: 86px; height: 86px; border: 2px solid rgba(255,255,255,.12); border-radius: 50%;
  }
  .header-mark {
    width: 56px; height: 56px; flex-shrink: 0;
    background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.25);
    border-radius: var(--radius); display: flex; align-items: center; justify-content: center;
    font-size: 30px;
  }
  .app-header h1 { font-size: 25px; font-weight: 700; letter-spacing: .2px; }
  .app-header p { font-size: 15px; opacity: .9; margin-top: 2px; font-style: italic; }

  /* USER BAR */
  .user-bar {
    display: flex; align-items: center; justify-content: space-between;
    background: #fff; border: 1px solid var(--line); border-radius: var(--radius-lg);
    padding: 11px 16px; box-shadow: var(--shadow); margin-bottom: 18px;
  }
  .user-bar-left { display: flex; align-items: center; gap: 11px; }
  .user-bar-right { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
  .ub-avatar {
    width: 38px; height: 38px; border-radius: 50%;
    background: linear-gradient(135deg, var(--navy), var(--teal));
    color: #fff; font-weight: 700; font-size: 15px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .ub-name { font-weight: 700; font-size: 16px; }
  .ub-email { color: var(--faint); font-size: 13px; }
  .ub-role { font-size: 12px; color: var(--gold); font-weight: 700; }

  /* PROGRESS */
  .progress-wrap { margin-bottom: 22px; }
  .progress-labels { display: flex; gap: 2px; margin-bottom: 9px; }
  .progress-label { flex: 1; text-align: center; font-size: 12.5px; color: var(--faint); font-weight: 700; }
  .progress-label.done { color: var(--green); }
  .progress-label.active { color: var(--navy); }
  .progress-bar { display: flex; gap: 4px; height: 5px; }
  .progress-seg { flex: 1; border-radius: 99px; background: var(--line); transition: background .3s; }
  .progress-seg.done { background: var(--green); }
  .progress-seg.active { background: var(--navy); }

  /* CARD */
  .card {
    background: #fff; border: 1px solid var(--line); border-radius: var(--radius-lg);
    padding: 26px 28px; box-shadow: var(--shadow-md); margin-bottom: 16px;
  }
  .card-title {
    font-size: 19px; font-weight: 700; color: var(--navy);
    margin-bottom: 20px; padding-bottom: 14px;
    border-bottom: 2px solid var(--navy-50);
    display: flex; align-items: center; gap: 10px;
  }
  .card-title .icon {
    width: 36px; height: 36px; background: var(--navy-50); border-radius: var(--radius);
    display: flex; align-items: center; justify-content: center; font-size: 19px; flex-shrink: 0;
  }

  /* FORM */
  .form-group { margin-bottom: 16px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-label { display: block; font-size: 15px; font-weight: 700; color: var(--muted); margin-bottom: 6px; }
  .req { color: var(--red); }
  input[type=text], input[type=email], input[type=tel], input[type=date], input[type=password], select {
    width: 100%; padding: 11px 13px;
    border: 1px solid var(--line); border-radius: var(--radius);
    font-size: 16px; color: var(--ink); font-family: inherit;
    background: #fff; outline: none; transition: border-color .15s, box-shadow .15s;
  }
  select { cursor: pointer; }
  input:focus, select:focus { border-color: var(--navy); box-shadow: 0 0 0 3px rgba(13,59,102,.1); }
  input:disabled, select:disabled { background: var(--paper); color: var(--faint); cursor: not-allowed; }
  .field-hint { font-size: 13px; color: var(--faint); margin-top: 5px; }

  /* RADIO (BHYT) */
  .radio-group { display: flex; gap: 10px; flex-wrap: wrap; }
  .radio-pill {
    flex: 1; min-width: 140px; border: 1px solid var(--line); border-radius: var(--radius);
    padding: 11px 14px; cursor: pointer; display: flex; align-items: center; gap: 9px;
    font-size: 15px; transition: all .15s; background: #fff;
  }
  .radio-pill:hover { border-color: var(--navy); }
  .radio-pill.active { border-color: var(--navy); background: var(--navy-50); font-weight: 700; color: var(--navy); }
  .radio-pill .dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--faint); flex-shrink: 0; }
  .radio-pill.active .dot { border-color: var(--navy); background: radial-gradient(circle, var(--navy) 0 5px, #fff 5px); }

  /* BUTTONS */
  .btn {
    padding: 11px 24px; border-radius: var(--radius); font-size: 16px;
    font-weight: 700; cursor: pointer; border: 1px solid transparent;
    font-family: inherit; transition: all .15s;
    display: inline-flex; align-items: center; gap: 7px;
  }
  .btn-primary { background: var(--navy); color: #fff; }
  .btn-primary:hover { background: var(--navy-700); }
  .btn-primary:disabled { background: var(--line); color: var(--faint); cursor: not-allowed; }
  .btn-outline { background: #fff; color: var(--muted); border-color: var(--line); }
  .btn-outline:hover { border-color: var(--navy); color: var(--navy); }
  .btn-success { background: var(--green); color: #fff; }
  .btn-success:hover { background: #155f3a; }
  .btn-danger { background: #fff; color: var(--red); border-color: #e7b9b5; }
  .btn-danger:hover { background: var(--red-50); }
  .btn-block { width: 100%; justify-content: center; }
  .btn-sm { padding: 7px 14px; font-size: 14px; }
  .btn-actions {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 24px; padding-top: 18px; border-top: 1px solid var(--line-soft);
  }

  /* CHIPS */
  .chip-group { display: flex; flex-wrap: wrap; gap: 9px; margin-bottom: 6px; }
  .chip {
    padding: 8px 16px; border-radius: 999px; border: 1px solid var(--line);
    background: #fff; color: var(--muted); font-size: 15px; cursor: pointer;
    transition: all .15s; font-family: inherit;
  }
  .chip:hover { border-color: var(--navy); color: var(--navy); }
  .chip.active { background: var(--navy); border-color: var(--navy); color: #fff; font-weight: 700; }

  /* CLINIC / DOCTOR ITEMS */
  .clinic-item, .doctor-item {
    border: 1px solid var(--line); border-radius: var(--radius-lg);
    padding: 15px 17px; cursor: pointer; transition: all .15s; margin-bottom: 11px;
  }
  .clinic-item { display: flex; justify-content: space-between; align-items: flex-start; }
  .doctor-item { display: flex; align-items: center; gap: 14px; }
  .clinic-item:hover, .doctor-item:hover { border-color: var(--navy); background: var(--navy-50); }
  .clinic-item.active, .doctor-item.active { border-color: var(--navy); background: var(--navy-50); box-shadow: 0 0 0 2px rgba(13,59,102,.12); }
  .clinic-name, .doctor-name { font-size: 17px; font-weight: 700; color: var(--navy); margin-bottom: 4px; }
  .clinic-address { font-size: 14px; color: var(--muted); margin-bottom: 4px; }
  .clinic-specs { font-size: 13.5px; color: var(--faint); }
  .clinic-meta { text-align: right; flex-shrink: 0; padding-left: 14px; }
  .dist-badge { display: inline-block; background: var(--navy); color: #fff; font-size: 13.5px; font-weight: 700; padding: 3px 11px; border-radius: 999px; margin-bottom: 5px; }
  .nearest-badge { display: inline-block; background: var(--green-50); color: var(--green); font-size: 12.5px; font-weight: 700; padding: 2px 9px; border-radius: 999px; }
  .rating { font-size: 14px; color: var(--muted); margin-top: 4px; }
  .avatar {
    width: 48px; height: 48px; border-radius: 50%;
    background: linear-gradient(135deg, var(--navy), var(--teal));
    color: #fff; font-size: 15px; font-weight: 700; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .doctor-meta { font-size: 14px; color: var(--muted); margin-top: 3px; }

  /* TIME SLOTS */
  .slot-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 9px; margin-top: 12px; }
  .slot-btn {
    padding: 11px 4px; border-radius: var(--radius); border: 1px solid var(--line);
    background: #fff; font-size: 16px; cursor: pointer; text-align: center;
    transition: all .12s; color: var(--ink); font-family: inherit;
  }
  .slot-btn:hover:not(:disabled) { border-color: var(--navy); background: var(--navy-50); color: var(--navy); }
  .slot-btn.selected { border-color: var(--navy); background: var(--navy); color: #fff; font-weight: 700; }
  .slot-btn.taken { background: var(--red-50); color: var(--red); border-color: #e7b9b5; cursor: not-allowed; text-decoration: line-through; }
  .slot-btn.blocked { background: var(--paper); color: var(--faint); border-color: var(--line); cursor: not-allowed; }
  .slot-legend { display: flex; gap: 18px; flex-wrap: wrap; font-size: 14px; color: var(--muted); margin: 6px 0 4px; }
  .slot-legend span { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 11px; height: 11px; border-radius: 3px; flex-shrink: 0; }

  /* INFO TABLE — như một phiếu hẹn khám */
  .info-table { width: 100%; border-collapse: collapse; }
  .info-table tr { border-bottom: 1px dotted var(--line); }
  .info-table tr:last-child { border-bottom: none; }
  .info-table td { padding: 11px 0; font-size: 16px; vertical-align: top; }
  .info-table td:first-child { color: var(--muted); width: 36%; }
  .info-table td:last-child { font-weight: 700; text-align: right; }

  /* ALERTS */
  .alert { padding: 13px 16px; border-radius: var(--radius); font-size: 15px; margin-bottom: 16px; display: flex; gap: 11px; align-items: flex-start; line-height: 1.5; }
  .alert-icon { font-size: 18px; flex-shrink: 0; }
  .alert-info { background: var(--navy-50); color: var(--blue); border: 1px solid #bcd2e8; }
  .alert-success { background: var(--green-50); color: var(--green); border: 1px solid #aedcc1; }
  .alert-warning { background: var(--amber-50); color: var(--amber); border: 1px solid #ecd49a; }
  .alert-error { background: var(--red-50); color: var(--red); border: 1px solid #e7b9b5; }

  .section-label { font-size: 13px; font-weight: 700; color: var(--faint); text-transform: uppercase; letter-spacing: .06em; margin: 20px 0 10px; }

  /* SUCCESS — phiếu hẹn */
  .success-screen { text-align: center; }
  .seal {
    width: 84px; height: 84px; border-radius: 50%;
    background: var(--green-50); color: var(--green);
    border: 2px solid var(--green); font-size: 40px;
    display: flex; align-items: center; justify-content: center; margin: 4px auto 16px;
  }
  .success-title { font-size: 26px; font-weight: 700; color: var(--navy); margin-bottom: 4px; }
  .success-sub { font-size: 16px; color: var(--muted); margin-bottom: 22px; }
  .slip {
    background: var(--paper); border: 1px solid var(--line); border-left: 4px solid var(--navy);
    border-radius: var(--radius); padding: 18px 22px; text-align: left; margin-bottom: 18px;
  }
  .slip-code { font-size: 18px; font-weight: 700; color: var(--navy); margin-bottom: 8px; letter-spacing: .5px; }

  /* APPT CARD */
  .appt-card { border: 1px solid var(--line); border-radius: var(--radius-lg); padding: 15px 17px; margin-bottom: 11px; display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .badge { display: inline-block; font-size: 13px; font-weight: 700; padding: 3px 10px; border-radius: 999px; }
  .badge-ok { background: var(--green-50); color: var(--green); }
  .badge-cancel { background: var(--red-50); color: var(--red); }

  /* ADMIN TABLE */
  .tbl { width: 100%; border-collapse: collapse; font-size: 14.5px; }
  .tbl th, .tbl td { text-align: left; padding: 9px 8px; border-bottom: 1px solid var(--line-soft); }
  .tbl th { color: var(--muted); font-size: 13px; text-transform: uppercase; letter-spacing: .04em; }
  .tbl-wrap { overflow-x: auto; }

  /* AUTH */
  .auth-wrap { max-width: 430px; margin: 28px auto; }
  .auth-logo { text-align: center; margin-bottom: 22px; }
  .auth-logo-icon {
    width: 68px; height: 68px; border-radius: var(--radius-lg);
    background: linear-gradient(135deg, var(--navy), var(--teal));
    display: flex; align-items: center; justify-content: center; font-size: 34px;
    margin: 0 auto 12px; color: #fff;
  }
  .auth-logo h2 { font-size: 22px; font-weight: 700; color: var(--navy); }
  .auth-logo p { font-size: 15px; color: var(--muted); margin-top: 3px; }
  .auth-tabs { display: flex; gap: 4px; margin-bottom: 20px; background: var(--paper); padding: 4px; border-radius: var(--radius); border: 1px solid var(--line); }
  .auth-tab { flex: 1; text-align: center; padding: 10px 0; border-radius: 4px; font-size: 15px; font-weight: 700; cursor: pointer; color: var(--muted); border: none; background: transparent; font-family: inherit; }
  .auth-tab.active { background: #fff; color: var(--navy); box-shadow: var(--shadow); }
  .auth-error { background: var(--red-50); color: var(--red); font-size: 14px; padding: 11px 13px; border-radius: var(--radius); margin-bottom: 14px; border: 1px solid #e7b9b5; display: none; }
  .auth-error.show { display: block; }
  .auth-foot { font-size: 14px; color: var(--muted); text-align: center; margin-top: 16px; }
  .auth-foot a { color: var(--navy); font-weight: 700; text-decoration: none; }

  .loading { text-align: center; padding: 44px; color: var(--faint); font-size: 16px; }
  .spinner { width: 30px; height: 30px; border: 3px solid var(--line); border-top-color: var(--navy); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .footer-note { text-align: center; font-size: 13px; color: var(--faint); margin-top: 26px; font-style: italic; }

  @media (max-width: 540px) {
    body { font-size: 16px; padding: 18px 12px 44px; }
    .slot-grid { grid-template-columns: repeat(3, 1fr); }
    .form-row { grid-template-columns: 1fr; }
    .app-header { padding: 20px; gap: 14px; }
    .app-header h1 { font-size: 21px; }
    .card { padding: 20px 17px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="app-header">
    <div class="header-mark">🏥</div>
    <div>
      <h1>Đặt lịch khám sức khỏe online</h1>
      <p>Chọn phòng khám · Chuyên khoa · Bác sĩ · Thời gian · Nhận email xác nhận</p>
    </div>
  </div>

  <div id="userBar"></div>

  <div class="progress-wrap" id="progressWrap" style="display:none">
    <div class="progress-labels" id="progressLabels"></div>
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div id="appContent"></div>

  <div class="footer-note">Hệ thống đặt lịch khám — Bài tập lớn môn Công nghệ phần mềm</div>
</div>

<script>
// ── API HELPER ───────────────────────────────────────────────
async function api(method, url, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' }, credentials: 'same-origin' };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(url, opts);
  return r.json();
}
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

// ── DATA ─────────────────────────────────────────────────────
let CLINICS = [], DOCTORS = [];
const SPECIALTY_SYMPTOMS = {
  "Tim mạch":      ["Đau ngực","Hồi hộp - tim đập nhanh","Khó thở khi gắng sức","Phù chân"],
  "Nội tiêu hóa":  ["Đau bụng - buồn nôn","Ợ chua - trào ngược","Tiêu chảy/táo bón","Chướng bụng"],
  "Nhi khoa":      ["Trẻ sốt cao","Ho kéo dài","Chậm phát triển","Dị ứng thức ăn"],
  "Da liễu":       ["Nổi mẩn - ngứa","Mụn trứng cá","Rụng tóc","Vết thương lâu lành"],
  "Thần kinh":     ["Đau đầu mãn tính","Chóng mặt","Tê bì tay chân","Mất ngủ"],
  "Cơ xương khớp": ["Đau lưng - cổ","Đau khớp gối","Cứng khớp buổi sáng","Thoát vị đĩa đệm"],
};
const STEP_LABELS = ["Thông tin","Phòng khám","Chuyên khoa","Thời gian","Xác nhận","Hoàn tất"];

// ── STATE ────────────────────────────────────────────────────
let SESSION = null, AUTH_MODE = 'login', AUTH_ERROR = '', VIEW = 'booking';
let S = freshState();

function freshState() {
  return {
    step: 1,
    patient: {
      name: SESSION?.name || '', email: SESSION?.email || '', phone: SESSION?.phone || '',
      province: 'Hà Nội', district: '', ward: '', addressDetail: '',
      insurance: 'Không', insuranceNo: '',
    },
    clinic: null, specialty: null, symptom: null, doctor: null,
    date: '', slot: null,
    bookedSlots: [], blockedSlots: [],
    confirmedAppt: null, emailStatus: null, emailError: '',
    logs: [],
  };
}
function addLog(m){ S.logs.push(`[${new Date().toLocaleTimeString('vi-VN')}] ${m}`); }

// ── HELPERS ──────────────────────────────────────────────────
function nearestClinics(){ return [...CLINICS].sort((a,b)=>a.distance-b.distance); }
function authInitials(n){ return (n||'').trim().split(/\s+/).slice(-2).map(w=>w[0]).join('').toUpperCase()||'?'; }
function unavailable(){ return [...S.bookedSlots, ...S.blockedSlots]; }
function suggestAlternatives(doctor, taken, preferred){
  const free = doctor.slots.filter(s=>!taken.includes(s) && s!==preferred);
  free.sort((a,b)=>Math.abs(parseInt(a)-parseInt(preferred))-Math.abs(parseInt(b)-parseInt(preferred)));
  return free.slice(0,6);
}
const isEmail = e => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e||'');
const isPhoneVN = p => /^0\d{9}$/.test((p||'').replace(/\s/g,''));

// ── RENDER ───────────────────────────────────────────────────
function render() {
  const PW=document.getElementById('progressWrap'), UB=document.getElementById('userBar'), AC=document.getElementById('appContent');
  if (!SESSION) { PW.style.display='none'; UB.innerHTML=''; AC.innerHTML=renderAuth(); bindAuth(); return; }
  renderUserBar(UB);
  if (VIEW==='myappts') { PW.style.display='none'; renderMyAppts(AC); return; }
  if (VIEW==='admin') { PW.style.display='none'; renderAdmin(AC); return; }
  PW.style.display=''; renderProgress();
  AC.innerHTML = ({1:renderStep1,2:renderStep2,3:renderStep3,4:renderStep4,5:renderStep5,6:renderStep6}[S.step]||renderStep1)();
  bindAll();
}

function renderUserBar(el){
  const admin = SESSION.role==='admin';
  el.innerHTML = `
  <div class="user-bar">
    <div class="user-bar-left">
      <div class="ub-avatar">${authInitials(SESSION.name)}</div>
      <div>
        <div class="ub-name">${esc(SESSION.name)} ${admin?'<span class="ub-role">· QUẢN TRỊ</span>':''}</div>
        <div class="ub-email">${esc(SESSION.email)}</div>
      </div>
    </div>
    <div class="user-bar-right">
      ${admin?`<button class="btn btn-outline btn-sm" id="btnAdmin">⚙ Quản trị</button>`:''}
      <button class="btn btn-outline btn-sm" id="btnMyAppts">📋 Lịch của tôi</button>
      <button class="btn btn-outline btn-sm" id="btnLogout">Đăng xuất</button>
    </div>
  </div>`;

        <div class="form-group"><label class="form-label">Nhập lại mật khẩu</label><input type="password" id="aPass2" placeholder="••••••••"></div>

function bindAuth(){
  const sw=(m)=>{AUTH_MODE=m;AUTH_ERROR='';render();};
  document.getElementById('tabLogin')?.addEventListener('click',()=>sw('login'));
  document.getElementById('tabRegister')?.addEventListener('click',()=>sw('register'));
  document.getElementById('goReg')?.addEventListener('click',e=>{e.preventDefault();sw('register');});
  document.getElementById('goLogin')?.addEventListener('click',e=>{e.preventDefault();sw('login');});
  document.getElementById('btnLogin')?.addEventListener('click', async ()=>{
    const email=document.getElementById('aEmail').value.trim(), password=document.getElementById('aPass').value;
    if(!email||!password){AUTH_ERROR='Vui lòng nhập đầy đủ email và mật khẩu.';return render();}
    const r=await api('POST','/api/login',{email,password});
    if(!r.ok){AUTH_ERROR=r.error;return render();}
    SESSION=r.user; S=freshState(); AUTH_ERROR=''; render();
  });
  document.getElementById('btnRegister')?.addEventListener('click', async ()=>{
    const name=document.getElementById('aName').value.trim(), email=document.getElementById('aEmail').value.trim();
    const phone=document.getElementById('aPhone').value.trim(), password=document.getElementById('aPass').value, p2=document.getElementById('aPass2').value;
    if(!name)return (AUTH_ERROR='Vui lòng nhập họ và tên.',render());
    if(!isEmail(email))return (AUTH_ERROR='Email không hợp lệ.',render());
    if(phone&&!isPhoneVN(phone))return (AUTH_ERROR='Số điện thoại phải gồm 10 số, bắt đầu bằng 0.',render());
    if(password.length<6)return (AUTH_ERROR='Mật khẩu phải có ít nhất 6 ký tự.',render());
    if(password!==p2)return (AUTH_ERROR='Mật khẩu nhập lại không khớp.',render());
    const r=await api('POST','/api/register',{name,email,phone,password});
    if(!r.ok){AUTH_ERROR=r.error;return render();}
    SESSION=r.user; S=freshState(); AUTH_ERROR=''; render();
  });
}

  const appts = await api('GET','/api/admin/appointments');
  const today = new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Ho_Chi_Minh'});
  if(!ADMIN.doctorId) ADMIN.doctorId = DOCTORS[0]?.id || null;
  if(!ADMIN.date) ADMIN.date = today;
  const doc = DOCTORS.find(d=>d.id===ADMIN.doctorId);
  ADMIN.blocked = await api('GET',`/api/admin/blocked?doctorId=${ADMIN.doctorId}&date=${ADMIN.date}`);
  const bookedToday = appts.filter(a=>+a.doctor_id===ADMIN.doctorId && a.date===ADMIN.date && a.status!=='cancelled').map(a=>a.slot);

  el.innerHTML = `
  <div class="card">
    <div class="card-title"><div class="icon">⚙</div> Quản lý khung giờ (mở/khóa)</div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Bác sĩ</label>
        <select id="admDoc">${DOCTORS.map(d=>{const c=CLINICS.find(c=>c.id===d.clinicId);return `<option value="${d.id}" ${d.id===ADMIN.doctorId?'selected':''}>${esc(d.name)} — ${esc(d.specialty)} (${esc(c?.name||'')})</option>`;}).join('')}</select></div>
      <div class="form-group"><label class="form-label">Ngày</label><input type="date" id="admDate" value="${ADMIN.date}"></div>
    </div>
    <div class="slot-legend">
      <span><span class="legend-dot" style="background:#fff;border:1px solid var(--line)"></span>Mở (bấm để khóa)</span>
      <span><span class="legend-dot" style="background:var(--paper);border:1px solid var(--line)"></span>Đã khóa (bấm để mở)</span>
      <span><span class="legend-dot" style="background:var(--red-50);border:1px solid #e7b9b5"></span>Có người đặt</span>
    </div>
    <div class="slot-grid">${(doc?.slots||[]).map(sl=>{
      const isBooked=bookedToday.includes(sl), isBlocked=ADMIN.blocked.includes(sl);
      const cls=isBooked?'taken':isBlocked?'blocked':'';
      return `<button class="slot-btn ${cls}" ${isBooked?'disabled title="Đã có người đặt"':''} data-adm-slot="${sl}">${sl}</button>`;
    }).join('')}</div>
  </div>

  <div class="card">
    <div class="card-title"><div class="icon">🗂</div> Tất cả lịch hẹn (${appts.length})</div>
    <div class="tbl-wrap"><table class="tbl">
      <thead><tr><th>Mã</th><th>Bệnh nhân</th><th>SĐT</th><th>Bác sĩ</th><th>Ngày</th><th>Giờ</th><th>Trạng thái</th></tr></thead>
      <tbody>${appts.map(a=>`<tr>
        <td>${esc(a.id)}</td><td>${esc(a.patient_name)}</td><td>${esc(a.patient_phone||'')}</td>
        <td>${esc(a.doctor_name)}</td><td>${esc(a.date)}</td><td>${esc(a.slot)}</td>
        <td><span class="badge ${a.status==='cancelled'?'badge-cancel':'badge-ok'}">${a.status==='cancelled'?'Đã hủy':'Xác nhận'}</span></td>
      </tr>`).join('')}</tbody>
    </table></div>
  </div>`;

  document.getElementById('admDoc').onchange=e=>{ADMIN.doctorId=+e.target.value;renderAdmin(el);};
  document.getElementById('admDate').onchange=e=>{ADMIN.date=e.target.value;renderAdmin(el);};
  el.querySelectorAll('[data-adm-slot]').forEach(b=>{
    if(b.disabled)return;
    b.addEventListener('click', async ()=>{
      const sl=b.dataset.admSlot, isBlocked=ADMIN.blocked.includes(sl);
      const url=isBlocked?'/api/admin/unblock':'/api/admin/block';
      await api('POST',url,{doctorId:ADMIN.doctorId,date:ADMIN.date,slot:sl});
      renderAdmin(el);
    });
  });
}

// ── BIND BOOKING EVENTS ──────────────────────────────────────
function bindAll(){
  // Step 1
  document.getElementById('btn1Next')?.addEventListener('click',()=>{
    const g=id=>document.getElementById(id);
    const name=g('pName').value.trim(), phone=g('pPhone').value.trim(), email=g('pEmail').value.trim();
    const province=g('pProvince').value, district=g('pDistrict').value.trim(), ward=g('pWard').value.trim(), addr=g('pAddr').value.trim();
    const insNo=g('pInsNo')?g('pInsNo').value.trim():'';
    if(!name)return alert('Vui lòng nhập họ và tên.');
    if(!isPhoneVN(phone))return alert('Số điện thoại phải gồm 10 số, bắt đầu bằng 0.');
    if(!isEmail(email))return alert('Email không hợp lệ.');
    if(!province||!district||!ward)return alert('Vui lòng chọn đầy đủ Tỉnh/Quận/Phường.');
    S.patient={...S.patient,name,phone,email,province,district,ward,addressDetail:addr,insuranceNo:insNo};
    addLog(`Bệnh nhân: ${name} <${email}> · ${phone}`);
    S.step=2; render();
  });
  // BHYT radio + cascading selects (cần re-render)
  document.querySelectorAll('[data-ins]').forEach(el=>el.addEventListener('click',()=>{ saveStep1Fields(); S.patient.insurance=el.dataset.ins; render(); }));
  document.getElementById('pProvince')?.addEventListener('change',e=>{ saveStep1Fields(); S.patient.province=e.target.value; S.patient.district=''; S.patient.ward=''; render(); });
  document.getElementById('pDistrict')?.addEventListener('change',e=>{ saveStep1Fields(); S.patient.district=e.target.value; S.patient.ward=''; render(); });

  // Nav
  document.getElementById('btnBack')?.addEventListener('click',()=>{S.step--;render();});
  document.getElementById('btnNext')?.addEventListener('click',()=>{S.step++;render();});

  // Clinic / spec / sym / doctor
  document.querySelectorAll('[data-clinic]').forEach(el=>el.addEventListener('click',()=>{S.clinic=CLINICS.find(c=>c.id===+el.dataset.clinic);S.specialty=null;S.symptom=null;S.doctor=null;addLog(`Phòng khám: ${S.clinic.name}`);render();}));
  document.querySelectorAll('[data-spec]').forEach(el=>el.addEventListener('click',()=>{S.specialty=el.dataset.spec;S.symptom=null;S.doctor=null;addLog(`Chuyên khoa: ${S.specialty}`);render();}));
  document.querySelectorAll('[data-sym]').forEach(el=>el.addEventListener('click',()=>{S.symptom=el.dataset.sym;addLog(`Triệu chứng: ${S.symptom}`);render();}));
  document.querySelectorAll('[data-doc]').forEach(el=>el.addEventListener('click',()=>{S.doctor=DOCTORS.find(d=>d.id===+el.dataset.doc);addLog(`Bác sĩ: ${S.doctor.name}`);render();}));

  // Date → lấy slot đã đặt + bị khóa
  document.getElementById('apptDate')?.addEventListener('change', async e=>{
    S.date=e.target.value; S.slot=null; addLog(`Ngày khám: ${S.date}`);
    const r=await api('GET',`/api/appointments/booked?doctorId=${S.doctor.id}&date=${S.date}`);
    S.bookedSlots=r.booked||[]; S.blockedSlots=r.blocked||[]; render();
  });
  document.querySelectorAll('[data-slot]').forEach(el=>el.addEventListener('click',()=>{if(el.disabled)return;S.slot=el.dataset.slot;addLog(`Giờ chọn: ${S.slot}`);render();}));
  document.querySelectorAll('[data-altslot]').forEach(el=>el.addEventListener('click',()=>{S.slot=el.dataset.altslot;addLog(`Giờ thay thế: ${S.slot}`);render();}));

  // Confirm
  document.getElementById('btnConfirm')?.addEventListener('click', async ()=>{
    addLog('Đang gửi yêu cầu đặt lịch...');
    const p=S.patient;
    const r=await api('POST','/api/appointments',{
      clinicId:S.clinic.id,clinicName:S.clinic.name,clinicAddress:S.clinic.address,
      doctorId:S.doctor.id,doctorName:S.doctor.name,specialty:S.specialty,symptom:S.symptom,
      date:S.date,slot:S.slot,patientPhone:p.phone,insurance:p.insurance==='Có BHYT'&&p.insuranceNo?`Có BHYT - ${p.insuranceNo}`:p.insurance,
      province:p.province,district:p.district,ward:p.ward,addressDetail:p.addressDetail,
    });
    if(!r.ok){
      addLog(`❌ ${r.error}`);
      // làm mới slot và quay lại bước 4 để chọn lại
      const b=await api('GET',`/api/appointments/booked?doctorId=${S.doctor.id}&date=${S.date}`);
      S.bookedSlots=b.booked||[]; S.blockedSlots=b.blocked||[]; S.step=4; alert(r.error); render(); return;
    }
    S.confirmedAppt=r.appointment;
    S.emailStatus = r.email===true ? 'ok' : (r.emailError? 'fail':'console');
    if(r.email===false && !r.emailError) S.emailStatus='console';
    addLog(`✅ Đặt lịch thành công! Mã: ${r.appointment.id}`);
    S.step=6; render();
  });

  document.getElementById('btnReset')?.addEventListener('click',()=>{S=freshState();render();});
  document.getElementById('btnViewAppts')?.addEventListener('click',()=>{VIEW='myappts';render();});
}

// Lưu giá trị các input đang nhập ở step 1 trước khi re-render (tránh mất dữ liệu)
function saveStep1Fields(){
  const g=id=>document.getElementById(id);
  if(g('pName')) S.patient.name=g('pName').value;
  if(g('pPhone')) S.patient.phone=g('pPhone').value;
  if(g('pEmail')) S.patient.email=g('pEmail').value;
  if(g('pAddr')) S.patient.addressDetail=g('pAddr').value;
  if(g('pInsNo')) S.patient.insuranceNo=g('pInsNo').value;
}

// ── INIT ─────────────────────────────────────────────────────
async function init(){
  document.getElementById('appContent').innerHTML=`<div class="loading"><div class="spinner"></div>Đang tải...</div>`;
  const [me,clinics,doctors]=await Promise.all([api('GET','/api/me'),api('GET','/api/clinics'),api('GET','/api/doctors')]);
  SESSION=me.user||null; CLINICS=clinics||[]; DOCTORS=doctors||[];
  if(SESSION) S=freshState();
  render();
}
init();
</script>
